<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src= /js/aframe.min.js></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="model-mantis" src="./assets/geometries.glb"></a-asset-item>
        <a-asset-item id="model-rf8a"   src="./assets/RF8A.glb"></a-asset-item>
        <a-asset-item id="model-rf8b"   src="./assets/RF8B.glb"></a-asset-item>
        <a-asset-item id="oceanic_02"   src="./assets/oceanic_02.glb"></a-asset-item>
        <a-asset-item id="oceanic_04"   src="./assets/oceanic_04.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#model-mantis" rotation="0 0 0" position="0 0 0.1" scale="0.5 0.5 0.5"
          animation="property: position; to: 0 0.01 0.01; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
          animation__rotate="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#model-rf8a" rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5"
          animation="property: position; to: 0 0.01 0.01; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
          animation__rotate="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear">
        </a-gltf-model>
        <a-gltf-model src="#model-rf8b" rotation="0 0 0" position="0.2 0.5 0" scale="0.5 0.5 0.5"
          animation="property: position; to: 0.2 0.5 0; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
          animation__rotate="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model src="#oceanic_02" rotation="1 1 0" position="0 0 0.1" scale="0.5 0.5 0.5"
          animation="property: position; to: 0 0.01 0.01; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
          animation__rotate="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-gltf-model src="#oceanic_04" rotation="0 0 0" position="0 0 0.1" scale="0.5 0.5 0.5"
          animation="property: position; to: 0 0.01 0.01; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
          animation__rotate="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear">
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
